services:
  auth-service:
    # Imagen que CI buildea y sube a ghcr.io en cada push a main.
    # Deploy normal:   docker compose up -d
    # Rollback a SHA:  IMAGE_TAG=a3f8c2d docker compose up -d auth-service
    image: ghcr.io/julinuzzo19/ecommerce-auth-service:${IMAGE_TAG:-latest}
    env_file:
      # Archivo .env en el server con las variables de producción.
      # Nunca se commitea — se crea manualmente en el server una sola vez.
      - .env
    ports:
      - "3010:3010"
    restart: unless-stopped
