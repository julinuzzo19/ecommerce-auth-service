name: CD

# Solo corre cuando CI termina exitosamente en main.
# Nunca se ejecuta en PRs — garantiza que solo se deploya código ya mergeado y verificado.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

env:
  IMAGE: ghcr.io/${{ github.repository }}
  # Ruta del monorepo en el server (WSL o VPS)
  COMPOSE_DIR: /home/julian/ecommerce

jobs:
  deploy:
    name: Deploy to server
    runs-on: self-hosted  # Corre en WSL donde instalaste el runner

    # Solo deploya si CI terminó con éxito
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Login al registry — necesario para hacer pull de imágenes privadas
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Bajar la imagen nueva buildeada por CI
      - name: Pull image
        run: docker pull ${{ env.IMAGE }}:latest

      # Reinicia solo ecommerce-auth-service usando el override de producción.
      # --no-deps: no reinicia servicios dependientes (DB, RabbitMQ, etc.)
      # El override prod reemplaza build: por image: apuntando a ghcr.io
      - name: Deploy auth-service
        run: |
          docker compose \
            -f ${{ env.COMPOSE_DIR }}/docker-compose-dev.yml \
            -f ${{ env.COMPOSE_DIR }}/docker-compose.prod.yml \
            up -d --no-deps ecommerce-auth-service
